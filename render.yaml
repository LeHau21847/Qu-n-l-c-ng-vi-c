databases:
  - name: cong-viec-db
    plan: free
    databaseName: congviec_db
    user: admin

services:
  - type: web
    name: quan-ly-cong-viec
    plan: free
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: cong-viec-db
          property: connectionString
      - key: PYTHON_VERSION
        value: "3.11.9"
